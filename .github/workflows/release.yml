name: Release

# Publishing a semver tag creates a GitHub Release. The Terraform Registry
# watches the repository's releases and ingests the new version automatically.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Needs write access to cut the release; nothing else.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Create release
        # gh is preinstalled on the runner, so no third-party action to pin.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
